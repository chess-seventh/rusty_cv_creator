name: 🧪 Rust Tests & Coverage
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
env:
  CARGO_TERM_COLOR: always
jobs:
  gates:
    name: 🧪 Tests, Lint & Format (devenv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ❄️ Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: 🛠️ Install devenv
        run: nix profile install nixpkgs#devenv
      # Every gate runs inside devenv so CI matches local exactly: the nightly
      # toolchain, just + tectonic, cargo-nextest/shear, and treefmt + its
      # formatters all come from devenv.nix (self-sufficient; no ~/devenv_shared).
      - name: 🧪 nextest
        run: devenv shell -- cargo nextest run --no-fail-fast
      - name: 🧵 threaded cargo test (ADR-0006 determinism guard)
        run: devenv shell -- cargo test
      - name: ✂️ clippy (deny warnings — failing gate)
        run: devenv shell -- cargo clippy --all-targets -- -D warnings
      - name: ✂️ clippy pedantic (advisory — never fails the build)
        run: devenv shell -- cargo clippy --all-targets -- -W clippy::pedantic
        continue-on-error: true
      - name: ✂️ treefmt (fail on change)
        run: devenv shell -- treefmt --fail-on-change --no-cache
      - name: 🧹 unused dependencies (cargo-shear)
        run: devenv shell -- cargo shear
  coverage:
    name: 📚 Collect test coverage (devenv)
    runs-on: ubuntu-latest
    # nightly toolchain / coverage tooling may break from time to time
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: ❄️ Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true
      - name: 🛠️ Install devenv
        run: nix profile install nixpkgs#devenv
      - name: 📚 Collect coverage data
        run: |
          devenv shell -- bash -c '
            cargo llvm-cov --no-report nextest
            cargo llvm-cov --no-report --doc
            cargo llvm-cov report --doctests --lcov --output-path lcov.info --ignore-filename-regex "schema\.rs"
          '
      - name: 💭 Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          token: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: lcov.info
